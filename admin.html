<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaz Admin - Full CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30,30,30,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; }
        input, textarea, select { background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; padding: 0.75rem; width: 100%; margin-bottom: 0.75rem; }
        button { transition: all 0.2s; cursor: pointer; }
        .tab-btn { background: transparent; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; border-radius: 40px; margin-right: 0.5rem; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .section { margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
        .section h3 { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.75rem; }
        .product-item, .order-item { background: #1a1a1a; border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .edit-btn { background: #3b82f6; padding: 0.25rem 1rem; border-radius: 20px; }
        .delete-btn { background: #dc2626; padding: 0.25rem 1rem; border-radius: 20px; }
        .save-btn { background: #10b981; padding: 0.5rem 1.5rem; border-radius: 40px; }
        .cancel-btn { background: #6b7280; padding: 0.5rem 1.5rem; border-radius: 40px; }
        .image-preview { max-width: 60px; max-height: 60px; border-radius: 8px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Login Screen -->
        <div id="login-screen" class="flex justify-center items-center min-h-screen">
            <div class="card w-full max-w-md">
                <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
                <input type="text" id="login-username" placeholder="Username" class="mb-3">
                <input type="password" id="login-password" placeholder="Password" class="mb-4">
                <button id="login-btn" class="bg-blue-600 w-full py-2 rounded-xl">Login</button>
                <p id="login-error" class="text-red-400 text-sm mt-3 hidden"></p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display: none;">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                <h1 class="text-3xl font-bold">Full CMS Dashboard</h1>
                <button id="logout-btn" class="bg-red-600 px-4 py-2 rounded-xl">Logout</button>
            </div>

            <!-- Tabs -->
            <div class="flex gap-2 mb-6 border-b border-white/10 pb-2 flex-wrap">
                <button id="tab-products" class="tab-btn active">📦 Products</button>
                <button id="tab-orders" class="tab-btn">📋 Orders</button>
                <button id="tab-settings" class="tab-btn">⚙️ Website Settings</button>
            </div>

            <!-- Products Panel -->
            <div id="products-panel">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4" id="form-title">Add New Product</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="product-name" placeholder="Product name *">
                        <input type="text" id="product-price" placeholder="Price (e.g., $489)">
                        <textarea id="product-desc" rows="2" placeholder="Short description"></textarea>
                        <textarea id="product-specs" rows="2" placeholder="Specifications"></textarea>
                        <input type="text" id="product-icon" placeholder="Icon (fa-microchip)" value="fa-microchip">
                        <div>
                            <input type="file" id="image-upload" accept="image/*">
                            <div id="upload-progress" class="text-xs text-gray-400 mt-1"></div>
                        </div>
                        <input type="text" id="product-image-url" placeholder="Or paste image URL">
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button id="save-product-btn" class="save-btn">Save Product</button>
                        <button id="cancel-edit" class="cancel-btn hidden">Cancel</button>
                    </div>
                    <p id="form-message" class="text-sm mt-3"></p>
                </div>
                <h2 class="text-xl font-semibold mb-3">All Products</h2>
                <div id="products-list" class="space-y-2"></div>
            </div>

            <!-- Orders Panel -->
            <div id="orders-panel" style="display: none;">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4">All Customer Orders</h2>
                    <div id="orders-list" class="space-y-2"></div>
                </div>
            </div>

            <!-- Website Settings Panel -->
            <div id="settings-panel" style="display: none;">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4">Edit Website Content</h2>
                    <div class="section"><h3>Hero Section</h3>
                        <input type="text" id="hero-title-line1" placeholder="First line (e.g., MaaZ)">
                        <input type="text" id="hero-title-line2" placeholder="Second line (e.g., visions.)">
                        <textarea id="hero-tagline" rows="2" placeholder="Tagline text"></textarea>
                        <input type="text" id="hero-btn-text" placeholder="Button text (e.g., Explore collection →)">
                    </div>
                    <div class="section"><h3>Best Sellers Section</h3>
                        <input type="text" id="bestsellers-title" placeholder="Title">
                        <input type="text" id="bestsellers-subtitle" placeholder="Subtitle">
                    </div>
                    <div class="section"><h3>Other Collection Section</h3>
                        <input type="text" id="other-title" placeholder="Title">
                        <input type="text" id="other-subtitle" placeholder="Subtitle">
                    </div>
                    <div class="section"><h3>Philosophy Page</h3>
                        <input type="text" id="philosophy-title" placeholder="Main heading">
                        <textarea id="philosophy-desc" rows="3" placeholder="Philosophy description text"></textarea>
                        <div class="grid grid-cols-3 gap-2 mt-2">
                            <input type="text" id="pillar1-title" placeholder="Pillar 1 title"><input type="text" id="pillar1-desc" placeholder="Pillar 1 desc">
                            <input type="text" id="pillar2-title" placeholder="Pillar 2 title"><input type="text" id="pillar2-desc" placeholder="Pillar 2 desc">
                            <input type="text" id="pillar3-title" placeholder="Pillar 3 title"><input type="text" id="pillar3-desc" placeholder="Pillar 3 desc">
                        </div>
                    </div>
                    <div class="section"><h3>Contact Page</h3>
                        <input type="text" id="contact-heading" placeholder="Heading">
                        <input type="text" id="contact-email" placeholder="Email">
                        <input type="text" id="contact-address" placeholder="Address">
                        <input type="text" id="social-instagram" placeholder="Instagram URL">
                        <input type="text" id="social-twitter" placeholder="Twitter URL">
                        <input type="text" id="social-linkedin" placeholder="LinkedIn URL">
                        <input type="text" id="social-instagram-handle" placeholder="Instagram handle (e.g., @maaz.studio)">
                    </div>
                    <div class="section"><h3>Footer</h3>
                        <input type="text" id="footer-text" placeholder="Footer copyright text">
                    </div>
                    <button id="save-settings-btn" class="bg-blue-600 w-full py-2 rounded-xl mt-2">Save All Settings</button>
                    <p id="settings-message" class="text-sm mt-2"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, query, orderBy, setDoc, where } from "firebase/firestore";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCyG5fwhCstTKBVjwz5j3D6UHvDHyho8J0",
            authDomain: "dmaaz-da461.firebaseapp.com",
            projectId: "dmaaz-da461",
            storageBucket: "dmaaz-da461.firebasestorage.app",
            messagingSenderId: "86883298773",
            appId: "1:86883298773:web:13743b90f7f7023955615c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cloudinary settings (free tier, no Firebase Storage needed)
        const CLOUD_NAME = "djfyusbqm";
        const UPLOAD_PRESET = "product_images";  // make sure this is unsigned

        // Hardcoded admin login
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "maaz123";

        // DOM elements
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');

        // Tabs
        const tabProducts = document.getElementById('tab-products');
        const tabOrders = document.getElementById('tab-orders');
        const tabSettings = document.getElementById('tab-settings');
        const productsPanel = document.getElementById('products-panel');
        const ordersPanel = document.getElementById('orders-panel');
        const settingsPanel = document.getElementById('settings-panel');

        // Product form elements
        const productName = document.getElementById('product-name');
        const productPrice = document.getElementById('product-price');
        const productDesc = document.getElementById('product-desc');
        const productSpecs = document.getElementById('product-specs');
        const productIcon = document.getElementById('product-icon');
        const imageUpload = document.getElementById('image-upload');
        const uploadProgress = document.getElementById('upload-progress');
        const productImageUrl = document.getElementById('product-image-url');
        const saveProductBtn = document.getElementById('save-product-btn');
        const cancelEditBtn = document.getElementById('cancel-edit');
        const formTitle = document.getElementById('form-title');
        const formMessage = document.getElementById('form-message');
        const productsListDiv = document.getElementById('products-list');
        const ordersListDiv = document.getElementById('orders-list');

        let editingProductId = null;
        let pendingImageFile = null;

        // ---------- Helper: Upload to Cloudinary ----------
        async function uploadToCloudinary(file) {
            if (!file) return null;
            const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            uploadProgress.textContent = "Uploading 0%";
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open("POST", url, true);
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        uploadProgress.textContent = `Uploading ${percent}%`;
                    }
                };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        uploadProgress.textContent = "Upload complete!";
                        resolve(response.secure_url);
                    } else {
                        reject(new Error("Cloudinary upload failed"));
                    }
                };
                xhr.onerror = () => reject(new Error("Network error"));
                xhr.send(formData);
            });
        }

        // ---------- Product Management ----------
        async function saveProduct() {
            const name = productName.value.trim();
            const price = productPrice.value.trim();
            const desc = productDesc.value.trim();
            const specs = productSpecs.value.trim();
            const icon = productIcon.value.trim() || 'fa-microchip';
            let image = productImageUrl.value.trim();

            if (!name || !price) {
                formMessage.textContent = 'Name and price are required';
                formMessage.classList.add('text-red-400');
                return;
            }

            formMessage.textContent = 'Saving...';
            formMessage.classList.remove('text-red-400', 'text-green-400');

            try {
                if (pendingImageFile) {
                    image = await uploadToCloudinary(pendingImageFile);
                    productImageUrl.value = image;
                    pendingImageFile = null;
                    imageUpload.value = '';
                }
                const productData = { name, price, desc, specs, icon, image: image || '' };
                if (editingProductId) {
                    await updateDoc(doc(db, 'products', editingProductId), productData);
                    formMessage.textContent = 'Product updated!';
                } else {
                    await addDoc(collection(db, 'products'), productData);
                    formMessage.textContent = 'Product added!';
                }
                formMessage.classList.add('text-green-400');
                resetProductForm();
                await loadProducts();
            } catch (err) {
                formMessage.textContent = 'Error: ' + err.message;
                formMessage.classList.add('text-red-400');
            }
        }

        function resetProductForm() {
            productName.value = '';
            productPrice.value = '';
            productDesc.value = '';
            productSpecs.value = '';
            productIcon.value = 'fa-microchip';
            productImageUrl.value = '';
            imageUpload.value = '';
            pendingImageFile = null;
            uploadProgress.textContent = '';
            editingProductId = null;
            formTitle.textContent = 'Add New Product';
            cancelEditBtn.classList.add('hidden');
        }

        async function loadProducts() {
            const snapshot = await getDocs(collection(db, 'products'));
            productsListDiv.innerHTML = '';
            for (const docSnap of snapshot.docs) {
                const prod = docSnap.data();
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div class="flex-1">
                        <strong>${escapeHtml(prod.name)}</strong> - ${escapeHtml(prod.price)}
                        <div class="text-sm text-gray-400">${escapeHtml(prod.desc?.substring(0, 80))}</div>
                        ${prod.image ? `<img src="${escapeHtml(prod.image)}" class="image-preview mt-2" alt="preview">` : ''}
                    </div>
                    <div class="flex gap-2">
                        <button class="edit-product-btn edit-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Edit</button>
                        <button class="delete-product-btn delete-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Delete</button>
                    </div>
                `;
                productsListDiv.appendChild(div);
            }
            // Attach edit events
            document.querySelectorAll('.edit-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const docRef = doc(db, 'products', id);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const prod = docSnap.data();
                        productName.value = prod.name;
                        productPrice.value = prod.price;
                        productDesc.value = prod.desc || '';
                        productSpecs.value = prod.specs || '';
                        productIcon.value = prod.icon || 'fa-microchip';
                        productImageUrl.value = prod.image || '';
                        editingProductId = id;
                        formTitle.textContent = 'Edit Product';
                        cancelEditBtn.classList.remove('hidden');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };
            });
            document.querySelectorAll('.delete-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete this product?')) {
                        await deleteDoc(doc(db, 'products', btn.getAttribute('data-id')));
                        await loadProducts();
                    }
                };
            });
        }

        // ---------- Orders Management ----------
        async function loadOrders() {
            const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);
            ordersListDiv.innerHTML = '';
            if (snapshot.empty) {
                ordersListDiv.innerHTML = '<p class="text-center text-white/50">No orders yet.</p>';
                return;
            }
            for (const docSnap of snapshot.docs) {
                const order = docSnap.data();
                const orderId = docSnap.id;
                const customer = order.customer || {};
                const product = order.product || {};
                const status = order.status || 'pending';
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
                    <div class="flex-1">
                        <div><strong>${escapeHtml(customer.name)}</strong> (${escapeHtml(customer.email)})</div>
                        <div class="text-sm">📞 ${escapeHtml(customer.phone)} | 🏠 ${escapeHtml(customer.address)}</div>
                        <div class="text-sm">🛍️ ${escapeHtml(product.name)} - ${escapeHtml(product.price)} | 💳 ${escapeHtml(customer.paymentMethod)}</div>
                        <div class="text-xs text-gray-400 mt-1">Order ID: ${escapeHtml(order.orderId || orderId)}</div>
                    </div>
                    <div class="flex flex-col gap-2 items-end">
                        <select class="status-select bg-gray-700 px-2 py-1 rounded-lg text-sm" data-id="${orderId}">
                            <option value="pending" ${status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                            <option value="processing" ${status === 'processing' ? 'selected' : ''}>🔧 Processing</option>
                            <option value="shipped" ${status === 'shipped' ? 'selected' : ''}>🚚 Shipped</option>
                            <option value="delivered" ${status === 'delivered' ? 'selected' : ''}>✅ Delivered</option>
                            <option value="cancelled" ${status === 'cancelled' ? 'selected' : ''}>❌ Cancelled</option>
                        </select>
                        <button class="delete-order-btn delete-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${orderId}">Delete Order</button>
                    </div>
                `;
                ordersListDiv.appendChild(div);
            }
            // Status change
            document.querySelectorAll('.status-select').forEach(select => {
                select.onchange = async () => {
                    const id = select.getAttribute('data-id');
                    await updateDoc(doc(db, 'orders', id), { status: select.value });
                    await loadOrders();
                };
            });
            // Delete order
            document.querySelectorAll('.delete-order-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete this order permanently?')) {
                        await deleteDoc(doc(db, 'orders', btn.getAttribute('data-id')));
                        await loadOrders();
                    }
                };
            });
        }

        // ---------- Website Settings ----------
        async function loadSettings() {
            const docRef = doc(db, 'settings', 'website');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const s = docSnap.data();
                document.getElementById('hero-title-line1').value = s.heroTitleLine1 || 'MaaZ';
                document.getElementById('hero-title-line2').value = s.heroTitleLine2 || 'visions.';
                document.getElementById('hero-tagline').value = s.heroTagline || 'Where minimalism meets in designed to reshape perception.';
                document.getElementById('hero-btn-text').value = s.heroBtnText || 'Explore collection →';
                document.getElementById('bestsellers-title').value = s.bestSellersTitle || 'Best Sellers';
                document.getElementById('bestsellers-subtitle').value = s.bestSellersSubtitle || 'Most loved by our community';
                document.getElementById('other-title').value = s.otherTitle || 'Other Collection';
                document.getElementById('other-subtitle').value = s.otherSubtitle || 'Discover more signature artefacts';
                document.getElementById('philosophy-title').value = s.philosophyTitle || 'Design as a dialogue.';
                document.getElementById('philosophy-desc').value = s.philosophyDesc || 'Every Maaz product merges tactile elegance with invisible technology.';
                document.getElementById('pillar1-title').value = s.pillar1Title || 'Precision';
                document.getElementById('pillar1-desc').value = s.pillar1Desc || 'Crafted with obsessive attention.';
                document.getElementById('pillar2-title').value = s.pillar2Title || 'Simplicity';
                document.getElementById('pillar2-desc').value = s.pillar2Desc || 'Removing the unnecessary.';
                document.getElementById('pillar3-title').value = s.pillar3Title || 'Evolution';
                document.getElementById('pillar3-desc').value = s.pillar3Desc || 'Constant refinement.';
                document.getElementById('contact-heading').value = s.contactHeading || 'Shape the future.';
                document.getElementById('contact-email').value = s.contactEmail || 'hello@maaz.studio';
                document.getElementById('contact-address').value = s.contactAddress || 'San Francisco, CA';
                document.getElementById('social-instagram').value = s.socialInstagram || '#';
                document.getElementById('social-twitter').value = s.socialTwitter || '#';
                document.getElementById('social-linkedin').value = s.socialLinkedin || '#';
                document.getElementById('social-instagram-handle').value = s.socialInstagramHandle || '@maaz.studio';
                document.getElementById('footer-text').value = s.footerText || '© 2026 Maaz — designed to reshape perception.';
            } else {
                // default fallback values already in placeholder
            }
        }

        async function saveSettings() {
            const settingsData = {
                heroTitleLine1: document.getElementById('hero-title-line1').value,
                heroTitleLine2: document.getElementById('hero-title-line2').value,
                heroTagline: document.getElementById('hero-tagline').value,
                heroBtnText: document.getElementById('hero-btn-text').value,
                bestSellersTitle: document.getElementById('bestsellers-title').value,
                bestSellersSubtitle: document.getElementById('bestsellers-subtitle').value,
                otherTitle: document.getElementById('other-title').value,
                otherSubtitle: document.getElementById('other-subtitle').value,
                philosophyTitle: document.getElementById('philosophy-title').value,
                philosophyDesc: document.getElementById('philosophy-desc').value,
                pillar1Title: document.getElementById('pillar1-title').value,
                pillar1Desc: document.getElementById('pillar1-desc').value,
                pillar2Title: document.getElementById('pillar2-title').value,
                pillar2Desc: document.getElementById('pillar2-desc').value,
                pillar3Title: document.getElementById('pillar3-title').value,
                pillar3Desc: document.getElementById('pillar3-desc').value,
                contactHeading: document.getElementById('contact-heading').value,
                contactEmail: document.getElementById('contact-email').value,
                contactAddress: document.getElementById('contact-address').value,
                socialInstagram: document.getElementById('social-instagram').value,
                socialTwitter: document.getElementById('social-twitter').value,
                socialLinkedin: document.getElementById('social-linkedin').value,
                socialInstagramHandle: document.getElementById('social-instagram-handle').value,
                footerText: document.getElementById('footer-text').value,
                updatedAt: new Date().toISOString()
            };
            try {
                await setDoc(doc(db, 'settings', 'website'), settingsData);
                const msg = document.getElementById('settings-message');
                msg.textContent = '✅ All settings saved!';
                msg.classList.add('text-green-400');
                setTimeout(() => { msg.textContent = ''; msg.classList.remove('text-green-400'); }, 3000);
            } catch (err) {
                const msg = document.getElementById('settings-message');
                msg.textContent = '❌ Error: ' + err.message;
                msg.classList.add('text-red-400');
            }
        }

        // ---------- Tab switching ----------
        function setActiveTab(tab) {
            [tabProducts, tabOrders, tabSettings].forEach(t => t.classList.remove('active'));
            if (tab === 'products') tabProducts.classList.add('active');
            if (tab === 'orders') tabOrders.classList.add('active');
            if (tab === 'settings') tabSettings.classList.add('active');
            productsPanel.style.display = tab === 'products' ? 'block' : 'none';
            ordersPanel.style.display = tab === 'orders' ? 'block' : 'none';
            settingsPanel.style.display = tab === 'settings' ? 'block' : 'none';
        }

        // ---------- Login / Logout ----------
        loginBtn.onclick = () => {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            if (u === VALID_USERNAME && p === VALID_PASSWORD) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                setActiveTab('products');
                loadProducts();
                loadOrders();
                loadSettings();
            } else {
                loginError.classList.remove('hidden');
            }
        };
        logoutBtn.onclick = () => {
            loginScreen.style.display = 'flex';
            dashboard.style.display = 'none';
        };

        // Event listeners for buttons
        saveProductBtn.onclick = saveProduct;
        cancelEditBtn.onclick = resetProductForm;
        document.getElementById('save-settings-btn').onclick = saveSettings;

        // Image upload handler
        imageUpload.addEventListener('change', (e) => {
            pendingImageFile = e.target.files[0] || null;
            if (pendingImageFile) uploadProgress.textContent = `Selected: ${pendingImageFile.name}`;
            else uploadProgress.textContent = '';
        });

        // Tab click handlers
        tabProducts.onclick = () => setActiveTab('products');
        tabOrders.onclick = () => { setActiveTab('orders'); loadOrders(); };
        tabSettings.onclick = () => { setActiveTab('settings'); loadSettings(); };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    </script>
</body>
</html>
