<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaz Admin - Minimal Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30,30,30,0.9); border-radius: 24px; padding: 1.5rem; max-width: 500px; margin: 2rem auto; }
        input { background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; padding: 0.75rem; width: 100%; margin-bottom: 1rem; }
        button { background: #3b82f6; padding: 0.75rem; border-radius: 12px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="text-xl font-bold mb-4">Add Product (Test)</h2>
        <input type="text" id="name" placeholder="Product name">
        <input type="text" id="price" placeholder="Price">
        <button id="save">Save to Firebase</button>
        <p id="message" class="mt-3 text-sm"></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyCyG5fwhCstTKBVjwz5j3D6UHvDHyho8J0",
            authDomain: "dmaaz-da461.firebaseapp.com",
            databaseURL: "https://dmaaz-da461-default-rtdb.firebaseio.com",
            projectId: "dmaaz-da461",
            storageBucket: "dmaaz-da461.firebasestorage.app",
            messagingSenderId: "86883298773",
            appId: "1:86883298773:web:13743b90f7f7023955615c",
            measurementId: "G-7GGQYKJSPE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('save').onclick = async () => {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const msg = document.getElementById('message');

            if (!name || !price) {
                msg.textContent = 'Name and price required';
                return;
            }

            msg.textContent = 'Saving...';
            try {
                await addDoc(collection(db, 'products'), { name, price });
                msg.textContent = '✅ Product saved!';
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
            } catch (err) {
                msg.textContent = '❌ Error: ' + err.message;
                console.error(err);
            }
        };
    </script>
</body>
</html>
