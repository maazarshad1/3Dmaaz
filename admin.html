<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaz Admin - Advanced Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30,30,30,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; }
        input, textarea, select { background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; padding: 0.75rem; width: 100%; margin-bottom: 0.75rem; }
        button { transition: all 0.2s; cursor: pointer; }
        .tab-btn { background: transparent; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; border-radius: 40px; margin-right: 0.5rem; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .product-item, .order-item { background: #1a1a1a; border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .edit-btn { background: #3b82f6; padding: 0.25rem 1rem; border-radius: 20px; }
        .delete-btn { background: #dc2626; padding: 0.25rem 1rem; border-radius: 20px; }
        .save-btn { background: #10b981; padding: 0.5rem 1.5rem; border-radius: 40px; }
        .cancel-btn { background: #6b7280; padding: 0.5rem 1.5rem; border-radius: 40px; }
        .image-preview { max-width: 60px; max-height: 60px; border-radius: 8px; margin-right: 0.5rem; }
        .images-preview-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div id="login-screen" class="flex justify-center items-center min-h-screen">
            <div class="card w-full max-w-md">
                <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
                <input type="text" id="login-username" placeholder="Username" class="mb-3">
                <input type="password" id="login-password" placeholder="Password" class="mb-4">
                <button id="login-btn" class="bg-blue-600 w-full py-2 rounded-xl">Login</button>
                <p id="login-error" class="text-red-400 text-sm mt-3 hidden"></p>
            </div>
        </div>

        <div id="dashboard" style="display: none;">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold">Advanced CMS</h1>
                <button id="logout-btn" class="bg-red-600 px-4 py-2 rounded-xl">Logout</button>
            </div>

            <div class="flex gap-2 mb-6 border-b border-white/10 pb-2">
                <button id="tab-products" class="tab-btn active">📦 Products</button>
                <button id="tab-orders" class="tab-btn">📋 Orders</button>
                <button id="tab-settings" class="tab-btn">⚙️ Settings</button>
            </div>

            <!-- Products Panel -->
            <div id="products-panel">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4" id="form-title">Add New Product</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="product-name" placeholder="Product name *">
                        <input type="text" id="product-price" placeholder="Price (e.g., $489)">
                        <textarea id="product-desc" rows="2" placeholder="Short description"></textarea>
                        <textarea id="product-specs" rows="2" placeholder="Specifications"></textarea>
                        <input type="text" id="product-icon" placeholder="Icon (fa-microchip)" value="fa-microchip">
                        <div>
                            <label class="text-sm">Main Image (Upload or URL)</label>
                            <input type="file" id="main-image-upload" accept="image/*">
                            <input type="text" id="main-image-url" placeholder="Or paste main image URL" class="mt-2">
                        </div>
                        <div>
                            <label class="text-sm">Additional Images (comma separated URLs or upload one by one)</label>
                            <input type="file" id="extra-images-upload" accept="image/*" multiple>
                            <textarea id="extra-images-urls" rows="2" placeholder="Or paste image URLs, one per line"></textarea>
                            <div id="extra-images-preview" class="images-preview-container"></div>
                        </div>
                        <div>
                            <label class="text-sm">Video URL (YouTube, Vimeo, etc.)</label>
                            <input type="text" id="product-video" placeholder="https://youtube.com/watch?v=...">
                        </div>
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button id="save-product-btn" class="save-btn">Save Product</button>
                        <button id="cancel-edit" class="cancel-btn hidden">Cancel</button>
                    </div>
                    <p id="form-message" class="text-sm mt-3"></p>
                    <div id="upload-progress" class="text-xs text-gray-400 mt-2"></div>
                </div>
                <h2 class="text-xl font-semibold mb-3">All Products</h2>
                <div id="products-list" class="space-y-2"></div>
            </div>

            <!-- Orders Panel (simplified) -->
            <div id="orders-panel" style="display: none;">
                <div class="card"><h2 class="text-xl font-semibold mb-4">Orders</h2><div id="orders-list"></div></div>
            </div>

            <!-- Settings Panel (same as before) -->
            <div id="settings-panel" style="display: none;">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4">Website Settings</h2>
                    <div class="section"><h3>Hero</h3>
                        <input type="text" id="hero-title-line1" placeholder="First line"><input type="text" id="hero-title-line2" placeholder="Second line"><textarea id="hero-tagline" rows="2"></textarea><input type="text" id="hero-btn-text" placeholder="Button text">
                    </div>
                    <button id="save-settings-btn" class="bg-blue-600 w-full py-2 rounded-xl">Save Settings</button>
                    <p id="settings-message" class="text-sm mt-2"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, query, orderBy, setDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyCyG5fwhCstTKBVjwz5j3D6UHvDHyho8J0",
            authDomain: "dmaaz-da461.firebaseapp.com",
            projectId: "dmaaz-da461",
            storageBucket: "dmaaz-da461.firebasestorage.app",
            messagingSenderId: "86883298773",
            appId: "1:86883298773:web:13743b90f7f7023955615c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cloudinary
        const CLOUD_NAME = "djfyusbqm";
        const UPLOAD_PRESET = "product_images";

        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "maaz123";

        // DOM elements
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const tabProducts = document.getElementById('tab-products');
        const tabOrders = document.getElementById('tab-orders');
        const tabSettings = document.getElementById('tab-settings');
        const productsPanel = document.getElementById('products-panel');
        const ordersPanel = document.getElementById('orders-panel');
        const settingsPanel = document.getElementById('settings-panel');

        // Product form fields
        const productName = document.getElementById('product-name');
        const productPrice = document.getElementById('product-price');
        const productDesc = document.getElementById('product-desc');
        const productSpecs = document.getElementById('product-specs');
        const productIcon = document.getElementById('product-icon');
        const mainImageUpload = document.getElementById('main-image-upload');
        const mainImageUrl = document.getElementById('main-image-url');
        const extraImagesUpload = document.getElementById('extra-images-upload');
        const extraImagesUrls = document.getElementById('extra-images-urls');
        const productVideo = document.getElementById('product-video');
        const saveBtn = document.getElementById('save-product-btn');
        const cancelBtn = document.getElementById('cancel-edit');
        const formTitle = document.getElementById('form-title');
        const formMessage = document.getElementById('form-message');
        const uploadProgress = document.getElementById('upload-progress');
        const productsListDiv = document.getElementById('products-list');
        const ordersListDiv = document.getElementById('orders-list');

        let editingProductId = null;
        let pendingMainImage = null;
        let pendingExtraImages = [];

        async function uploadToCloudinary(file, progressCallback) {
            if (!file) return null;
            const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            if (progressCallback) progressCallback(0);
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open("POST", url, true);
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable && progressCallback) {
                        progressCallback(Math.round((e.loaded / e.total) * 100));
                    }
                };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        resolve(response.secure_url);
                    } else reject(new Error("Upload failed"));
                };
                xhr.onerror = () => reject(new Error("Network error"));
                xhr.send(formData);
            });
        }

        async function saveProduct() {
            const name = productName.value.trim();
            const price = productPrice.value.trim();
            if (!name || !price) {
                formMessage.textContent = 'Name and price required';
                formMessage.classList.add('text-red-400');
                return;
            }
            formMessage.textContent = 'Saving...';
            formMessage.classList.remove('text-red-400', 'text-green-400');
            try {
                let mainImage = mainImageUrl.value.trim();
                if (pendingMainImage) {
                    uploadProgress.textContent = 'Uploading main image...';
                    mainImage = await uploadToCloudinary(pendingMainImage, (p) => { uploadProgress.textContent = `Main image ${p}%`; });
                    mainImageUrl.value = mainImage;
                    pendingMainImage = null;
                    mainImageUpload.value = '';
                }
                let extraImages = [];
                // Parse URLs from textarea (one per line)
                const urlsText = extraImagesUrls.value;
                if (urlsText.trim()) {
                    extraImages = urlsText.split('\n').map(u => u.trim()).filter(u => u);
                }
                // Upload any newly selected extra images
                if (pendingExtraImages.length) {
                    uploadProgress.textContent = `Uploading ${pendingExtraImages.length} extra images...`;
                    for (let i = 0; i < pendingExtraImages.length; i++) {
                        const imgUrl = await uploadToCloudinary(pendingExtraImages[i], (p) => { uploadProgress.textContent = `Extra ${i+1}: ${p}%`; });
                        extraImages.push(imgUrl);
                    }
                    pendingExtraImages = [];
                    extraImagesUpload.value = '';
                    extraImagesUrls.value = extraImages.join('\n');
                }
                const videoUrl = productVideo.value.trim();
                const productData = {
                    name, price,
                    desc: productDesc.value.trim(),
                    specs: productSpecs.value.trim(),
                    icon: productIcon.value.trim() || 'fa-microchip',
                    image: mainImage,
                    images: extraImages,
                    videoUrl: videoUrl
                };
                if (editingProductId) {
                    await updateDoc(doc(db, 'products', editingProductId), productData);
                    formMessage.textContent = 'Product updated!';
                } else {
                    await addDoc(collection(db, 'products'), productData);
                    formMessage.textContent = 'Product added!';
                }
                formMessage.classList.add('text-green-400');
                resetProductForm();
                await loadProducts();
                uploadProgress.textContent = '';
            } catch (err) {
                formMessage.textContent = 'Error: ' + err.message;
                formMessage.classList.add('text-red-400');
            }
        }

        function resetProductForm() {
            productName.value = '';
            productPrice.value = '';
            productDesc.value = '';
            productSpecs.value = '';
            productIcon.value = 'fa-microchip';
            mainImageUrl.value = '';
            extraImagesUrls.value = '';
            productVideo.value = '';
            mainImageUpload.value = '';
            extraImagesUpload.value = '';
            pendingMainImage = null;
            pendingExtraImages = [];
            editingProductId = null;
            formTitle.textContent = 'Add New Product';
            cancelBtn.classList.add('hidden');
        }

        async function loadProducts() {
            const snapshot = await getDocs(collection(db, 'products'));
            productsListDiv.innerHTML = '';
            for (const docSnap of snapshot.docs) {
                const prod = docSnap.data();
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div class="flex-1">
                        <strong>${escapeHtml(prod.name)}</strong> - ${escapeHtml(prod.price)}
                        <div class="text-sm text-gray-400">${escapeHtml(prod.desc?.substring(0, 60))}</div>
                        ${prod.image ? `<img src="${escapeHtml(prod.image)}" class="image-preview mt-2" alt="main">` : ''}
                        <div class="text-xs text-gray-500">${prod.images?.length || 0} extra images | ${prod.videoUrl ? 'video' : 'no video'}</div>
                    </div>
                    <div class="flex gap-2">
                        <button class="edit-product-btn edit-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Edit</button>
                        <button class="delete-product-btn delete-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Delete</button>
                    </div>
                `;
                productsListDiv.appendChild(div);
            }
            document.querySelectorAll('.edit-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const docRef = doc(db, 'products', id);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const prod = docSnap.data();
                        productName.value = prod.name;
                        productPrice.value = prod.price;
                        productDesc.value = prod.desc || '';
                        productSpecs.value = prod.specs || '';
                        productIcon.value = prod.icon || 'fa-microchip';
                        mainImageUrl.value = prod.image || '';
                        extraImagesUrls.value = (prod.images || []).join('\n');
                        productVideo.value = prod.videoUrl || '';
                        editingProductId = id;
                        formTitle.textContent = 'Edit Product';
                        cancelBtn.classList.remove('hidden');
                        window.scrollTo({ top: 0 });
                    }
                };
            });
            document.querySelectorAll('.delete-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete product?')) {
                        await deleteDoc(doc(db, 'products', btn.getAttribute('data-id')));
                        await loadProducts();
                    }
                };
            });
        }

        async function loadOrders() {
            const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);
            ordersListDiv.innerHTML = '';
            if (snapshot.empty) { ordersListDiv.innerHTML = '<p class="text-white/50">No orders</p>'; return; }
            snapshot.forEach(docSnap => {
                const order = docSnap.data();
                const cust = order.customer || {};
                ordersListDiv.innerHTML += `<div class="order-item"><div><strong>${cust.name}</strong> (${cust.email})<br>${order.product?.name} - ${order.product?.price}<br>${order.status || 'pending'}</div><button class="delete-btn" data-id="${docSnap.id}">Delete</button></div>`;
            });
            document.querySelectorAll('.delete-btn[data-id]').forEach(btn => {
                btn.onclick = async () => { await deleteDoc(doc(db, 'orders', btn.getAttribute('data-id'))); loadOrders(); };
            });
        }

        async function loadSettings() { /* similar to before */ }
        async function saveSettings() { 
            const data = { heroTitleLine1: document.getElementById('hero-title-line1').value };
            await setDoc(doc(db, 'settings', 'website'), data);
            document.getElementById('settings-message').textContent = 'Saved!';
        }

        // Event listeners
        mainImageUpload.addEventListener('change', (e) => { pendingMainImage = e.target.files[0]; });
        extraImagesUpload.addEventListener('change', (e) => { pendingExtraImages = Array.from(e.target.files); });
        saveBtn.onclick = saveProduct;
        cancelBtn.onclick = resetProductForm;
        document.getElementById('save-settings-btn').onclick = saveSettings;

        function setActiveTab(tab) {
            [tabProducts, tabOrders, tabSettings].forEach(t => t.classList.remove('active'));
            if (tab === 'products') tabProducts.classList.add('active');
            if (tab === 'orders') tabOrders.classList.add('active');
            if (tab === 'settings') tabSettings.classList.add('active');
            productsPanel.style.display = tab === 'products' ? 'block' : 'none';
            ordersPanel.style.display = tab === 'orders' ? 'block' : 'none';
            settingsPanel.style.display = tab === 'settings' ? 'block' : 'none';
            if (tab === 'orders') loadOrders();
            if (tab === 'settings') loadSettings();
        }
        tabProducts.onclick = () => setActiveTab('products');
        tabOrders.onclick = () => setActiveTab('orders');
        tabSettings.onclick = () => setActiveTab('settings');

        loginBtn.onclick = () => {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            if (u === VALID_USERNAME && p === VALID_PASSWORD) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                setActiveTab('products');
                loadProducts();
            } else loginError.classList.remove('hidden');
        };
        logoutBtn.onclick = () => { loginScreen.style.display = 'flex'; dashboard.style.display = 'none'; };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    </script>
</body>
</html>
