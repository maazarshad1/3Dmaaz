<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaz Admin - Fixed Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30,30,30,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; }
        input, textarea, select { background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; padding: 0.75rem; width: 100%; margin-bottom: 0.75rem; }
        button { transition: all 0.2s; cursor: pointer; }
        .product-item { background: #1a1a1a; border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .edit-btn { background: #3b82f6; padding: 0.25rem 1rem; border-radius: 20px; }
        .delete-btn { background: #dc2626; padding: 0.25rem 1rem; border-radius: 20px; }
        .save-btn { background: #10b981; padding: 0.5rem 1.5rem; border-radius: 40px; }
        .cancel-btn { background: #6b7280; padding: 0.5rem 1.5rem; border-radius: 40px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div id="login-screen" class="flex justify-center items-center min-h-screen">
            <div class="card w-full max-w-md">
                <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
                <input type="text" id="login-username" placeholder="Username" class="mb-3">
                <input type="password" id="login-password" placeholder="Password" class="mb-4">
                <button id="login-btn" class="bg-blue-600 w-full py-2 rounded-xl">Login</button>
                <p id="login-error" class="text-red-400 text-sm mt-3 hidden"></p>
            </div>
        </div>

        <div id="dashboard" style="display: none;">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold">Product Manager (Fixed Video)</h1>
                <button id="logout-btn" class="bg-red-600 px-4 py-2 rounded-xl">Logout</button>
            </div>

            <div class="card">
                <h2 class="text-xl font-semibold mb-4" id="form-title">Add/Edit Product</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="product-name" placeholder="Product name *">
                    <input type="text" id="product-price" placeholder="Price (e.g., $489)">
                    <textarea id="product-desc" rows="2" placeholder="Short description"></textarea>
                    <textarea id="product-specs" rows="2" placeholder="Specifications (one per line)"></textarea>
                    <input type="text" id="product-icon" placeholder="Icon (fa-microchip)" value="fa-microchip">
                    
                    <div>
                        <label class="text-sm">Main Image</label>
                        <input type="file" id="main-image-upload" accept="image/*">
                        <input type="text" id="main-image-url" placeholder="Or paste image URL" class="mt-2">
                    </div>
                    <div>
                        <label class="text-sm">Additional Images (URLs, one per line)</label>
                        <textarea id="extra-images-urls" rows="2" placeholder="https://...image1.jpg\nhttps://...image2.jpg"></textarea>
                        <input type="file" id="extra-images-upload" accept="image/*" multiple>
                    </div>
                    <div>
                        <label class="text-sm">Video (YouTube/Vimeo link or upload video file)</label>
                        <input type="text" id="product-video-url" placeholder="https://youtube.com/...">
                        <input type="file" id="video-upload" accept="video/*">
                        <div id="video-progress" class="text-xs text-gray-400 mt-1"></div>
                    </div>
                </div>
                <div class="flex gap-3 mt-4">
                    <button id="save-product-btn" class="save-btn">Save Product</button>
                    <button id="cancel-edit" class="cancel-btn hidden">Cancel</button>
                </div>
                <p id="form-message" class="text-sm mt-3"></p>
                <div id="upload-progress" class="text-xs text-gray-400 mt-2"></div>
            </div>

            <h2 class="text-xl font-semibold mb-3">All Products</h2>
            <div id="products-list" class="space-y-2"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyCyG5fwhCstTKBVjwz5j3D6UHvDHyho8J0",
            authDomain: "dmaaz-da461.firebaseapp.com",
            projectId: "dmaaz-da461",
            storageBucket: "dmaaz-da461.firebasestorage.app",
            messagingSenderId: "86883298773",
            appId: "1:86883298773:web:13743b90f7f7023955615c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CLOUD_NAME = "djfyusbqm";
        const UPLOAD_PRESET_IMAGE = "product_images";
        const UPLOAD_PRESET_VIDEO = "product_videos";

        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "maaz123";

        // DOM
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const productName = document.getElementById('product-name');
        const productPrice = document.getElementById('product-price');
        const productDesc = document.getElementById('product-desc');
        const productSpecs = document.getElementById('product-specs');
        const productIcon = document.getElementById('product-icon');
        const mainImageUpload = document.getElementById('main-image-upload');
        const mainImageUrl = document.getElementById('main-image-url');
        const extraImagesUrls = document.getElementById('extra-images-urls');
        const extraImagesUpload = document.getElementById('extra-images-upload');
        const productVideoUrl = document.getElementById('product-video-url');
        const videoUpload = document.getElementById('video-upload');
        const videoProgress = document.getElementById('video-progress');
        const saveBtn = document.getElementById('save-product-btn');
        const cancelBtn = document.getElementById('cancel-edit');
        const formTitle = document.getElementById('form-title');
        const formMessage = document.getElementById('form-message');
        const uploadProgress = document.getElementById('upload-progress');
        const productsListDiv = document.getElementById('products-list');

        let editingProductId = null;
        let pendingMainImage = null;
        let pendingExtraImages = [];
        let pendingVideoFile = null;

        async function uploadToCloudinary(file, preset, onProgress) {
            if (!file) return null;
            const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", preset);
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open("POST", url, true);
                if (onProgress) {
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
                    };
                }
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const resp = JSON.parse(xhr.responseText);
                        resolve(resp.secure_url);
                    } else {
                        reject(new Error("Cloudinary upload failed: " + xhr.status));
                    }
                };
                xhr.onerror = () => reject(new Error("Network error"));
                xhr.send(formData);
            });
        }

        async function saveProduct() {
            const name = productName.value.trim();
            const price = productPrice.value.trim();
            if (!name || !price) {
                formMessage.textContent = 'Name and price required';
                formMessage.classList.add('text-red-400');
                return;
            }
            formMessage.textContent = 'Saving...';
            formMessage.classList.remove('text-red-400', 'text-green-400');
            try {
                let mainImage = mainImageUrl.value.trim();
                if (pendingMainImage) {
                    uploadProgress.textContent = 'Uploading main image...';
                    mainImage = await uploadToCloudinary(pendingMainImage, UPLOAD_PRESET_IMAGE, (p) => { uploadProgress.textContent = `Main image ${p}%`; });
                    mainImageUrl.value = mainImage;
                    pendingMainImage = null;
                    mainImageUpload.value = '';
                }
                let extraImages = extraImagesUrls.value.split('\n').map(u => u.trim()).filter(u => u);
                if (pendingExtraImages.length) {
                    uploadProgress.textContent = `Uploading ${pendingExtraImages.length} extra images...`;
                    for (let i = 0; i < pendingExtraImages.length; i++) {
                        const imgUrl = await uploadToCloudinary(pendingExtraImages[i], UPLOAD_PRESET_IMAGE, (p) => { uploadProgress.textContent = `Extra ${i+1}: ${p}%`; });
                        extraImages.push(imgUrl);
                    }
                    pendingExtraImages = [];
                    extraImagesUpload.value = '';
                    extraImagesUrls.value = extraImages.join('\n');
                }
                let videoUrl = productVideoUrl.value.trim();
                if (pendingVideoFile) {
                    videoProgress.textContent = 'Uploading video...';
                    videoUrl = await uploadToCloudinary(pendingVideoFile, UPLOAD_PRESET_VIDEO, (p) => { videoProgress.textContent = `Video ${p}%`; });
                    productVideoUrl.value = videoUrl;
                    pendingVideoFile = null;
                    videoUpload.value = '';
                    videoProgress.textContent = 'Video uploaded!';
                }
                const productData = {
                    name, price,
                    desc: productDesc.value.trim(),
                    specs: productSpecs.value.trim(),
                    icon: productIcon.value.trim() || 'fa-microchip',
                    image: mainImage,
                    images: extraImages,
                    videoUrl: videoUrl
                };
                if (editingProductId) {
                    await updateDoc(doc(db, 'products', editingProductId), productData);
                    formMessage.textContent = 'Product updated!';
                } else {
                    await addDoc(collection(db, 'products'), productData);
                    formMessage.textContent = 'Product added!';
                }
                formMessage.classList.add('text-green-400');
                resetForm();
                await loadProducts();
                uploadProgress.textContent = '';
                videoProgress.textContent = '';
            } catch (err) {
                formMessage.textContent = 'Error: ' + err.message;
                formMessage.classList.add('text-red-400');
                console.error(err);
            }
        }

        function resetForm() {
            productName.value = '';
            productPrice.value = '';
            productDesc.value = '';
            productSpecs.value = '';
            productIcon.value = 'fa-microchip';
            mainImageUrl.value = '';
            extraImagesUrls.value = '';
            productVideoUrl.value = '';
            mainImageUpload.value = '';
            extraImagesUpload.value = '';
            videoUpload.value = '';
            pendingMainImage = null;
            pendingExtraImages = [];
            pendingVideoFile = null;
            editingProductId = null;
            formTitle.textContent = 'Add New Product';
            cancelBtn.classList.add('hidden');
        }

        async function loadProducts() {
            const snapshot = await getDocs(collection(db, 'products'));
            productsListDiv.innerHTML = '';
            for (const docSnap of snapshot.docs) {
                const prod = docSnap.data();
                productsListDiv.innerHTML += `
                    <div class="product-item">
                        <div><strong>${escapeHtml(prod.name)}</strong> - ${escapeHtml(prod.price)}<br><span class="text-xs">${prod.images?.length || 0} extra images | ${prod.videoUrl ? 'video' : 'no video'}</span></div>
                        <div><button class="edit-product-btn edit-btn" data-id="${docSnap.id}">Edit</button><button class="delete-product-btn delete-btn ml-2" data-id="${docSnap.id}">Delete</button></div>
                    </div>
                `;
            }
            document.querySelectorAll('.edit-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const docRef = doc(db, 'products', id);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const prod = docSnap.data();
                        productName.value = prod.name;
                        productPrice.value = prod.price;
                        productDesc.value = prod.desc || '';
                        productSpecs.value = prod.specs || '';
                        productIcon.value = prod.icon || 'fa-microchip';
                        mainImageUrl.value = prod.image || '';
                        extraImagesUrls.value = (prod.images || []).join('\n');
                        productVideoUrl.value = prod.videoUrl || '';
                        editingProductId = id;
                        formTitle.textContent = 'Edit Product';
                        cancelBtn.classList.remove('hidden');
                        window.scrollTo({ top: 0 });
                    }
                };
            });
            document.querySelectorAll('.delete-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete product?')) {
                        await deleteDoc(doc(db, 'products', btn.getAttribute('data-id')));
                        await loadProducts();
                    }
                };
            });
        }

        mainImageUpload.addEventListener('change', (e) => { pendingMainImage = e.target.files[0]; });
        extraImagesUpload.addEventListener('change', (e) => { pendingExtraImages = Array.from(e.target.files); });
        videoUpload.addEventListener('change', (e) => { pendingVideoFile = e.target.files[0]; });
        saveBtn.onclick = saveProduct;
        cancelBtn.onclick = resetForm;

        loginBtn.onclick = () => {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            if (u === VALID_USERNAME && p === VALID_PASSWORD) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                loadProducts();
            } else loginError.classList.remove('hidden');
        };
        logoutBtn.onclick = () => { loginScreen.style.display = 'flex'; dashboard.style.display = 'none'; };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    </script>
</body>
</html>
