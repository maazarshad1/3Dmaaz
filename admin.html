<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaz Admin - Complete Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30,30,30,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; }
        input, textarea, select { background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; padding: 0.75rem; width: 100%; margin-top: 0.25rem; margin-bottom: 0.5rem; }
        button { transition: all 0.2s; cursor: pointer; }
        .tab-btn { background: transparent; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; border-radius: 40px; margin-right: 0.5rem; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .product-item, .order-item { background: #1a1a1a; border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .product-item:hover, .order-item:hover { background: #252525; }
        .edit-btn { background: #3b82f6; padding: 0.25rem 1rem; border-radius: 20px; }
        .delete-btn { background: #dc2626; padding: 0.25rem 1rem; border-radius: 20px; }
        .save-btn { background: #10b981; padding: 0.5rem 1.5rem; border-radius: 40px; }
        .cancel-btn { background: #6b7280; padding: 0.5rem 1.5rem; border-radius: 40px; }
        .status-select { width: auto; display: inline-block; background: #1f1f1f; padding: 0.25rem; border-radius: 20px; }
        .image-preview { max-width: 60px; max-height: 60px; border-radius: 8px; margin-left: 1rem; }
        .upload-progress { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
        hr { border-color: rgba(255,255,255,0.1); margin: 1rem 0; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Login Screen -->
        <div id="login-screen" class="flex justify-center items-center min-h-screen">
            <div class="card w-full max-w-md">
                <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
                <input type="text" id="login-username" placeholder="Username (admin)" class="mb-3">
                <input type="password" id="login-password" placeholder="Password (maaz123)" class="mb-4">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 text-white w-full py-2 rounded-xl">Login</button>
                <p id="login-error" class="text-red-400 text-sm mt-3 hidden"></p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display: none;">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                <h1 class="text-3xl font-bold">Admin Dashboard</h1>
                <button id="logout-btn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl text-sm">Logout</button>
            </div>

            <!-- Tabs -->
            <div class="flex gap-2 mb-6 border-b border-white/10 pb-2">
                <button id="tab-products" class="tab-btn active">📦 Products</button>
                <button id="tab-orders" class="tab-btn">📋 Orders</button>
            </div>

            <!-- Products Panel -->
            <div id="products-panel">
                <!-- Add Product Form -->
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4" id="form-title">Add New Product</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="product-name" placeholder="Product name *">
                        <input type="text" id="product-price" placeholder="Price (e.g., $489)">
                        <textarea id="product-desc" rows="2" placeholder="Short description"></textarea>
                        <textarea id="product-specs" rows="2" placeholder="Specifications"></textarea>
                        <input type="text" id="product-icon" placeholder="Icon (fa-microchip)" value="fa-microchip">
                        <div>
                            <input type="file" id="image-upload" accept="image/*">
                            <div id="upload-progress" class="upload-progress"></div>
                        </div>
                        <input type="text" id="product-image-url" placeholder="Or paste image URL">
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button id="save-product-btn" class="save-btn">Save Product</button>
                        <button id="cancel-edit" class="cancel-btn hidden">Cancel</button>
                    </div>
                    <p id="form-message" class="text-sm mt-3"></p>
                </div>

                <!-- Products List -->
                <h2 class="text-xl font-semibold mb-3">All Products</h2>
                <div id="products-list" class="space-y-2"></div>
            </div>

            <!-- Orders Panel (hidden initially) -->
            <div id="orders-panel" style="display: none;">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4">All Customer Orders</h2>
                    <div id="orders-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, query, orderBy } from "firebase/firestore";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "firebase/storage";

        // Firebase config (your existing)
        const firebaseConfig = {
            apiKey: "AIzaSyCyG5fwhCstTKBVjwz5j3D6UHvDHyho8J0",
            authDomain: "dmaaz-da461.firebaseapp.com",
            databaseURL: "https://dmaaz-da461-default-rtdb.firebaseio.com",
            projectId: "dmaaz-da461",
            storageBucket: "dmaaz-da461.firebasestorage.app",
            messagingSenderId: "86883298773",
            appId: "1:86883298773:web:13743b90f7f7023955615c",
            measurementId: "G-7GGQYKJSPE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Hardcoded login
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "maaz123";

        // DOM elements
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');

        // Tabs
        const tabProducts = document.getElementById('tab-products');
        const tabOrders = document.getElementById('tab-orders');
        const productsPanel = document.getElementById('products-panel');
        const ordersPanel = document.getElementById('orders-panel');

        // Product form elements
        const productName = document.getElementById('product-name');
        const productPrice = document.getElementById('product-price');
        const productDesc = document.getElementById('product-desc');
        const productSpecs = document.getElementById('product-specs');
        const productIcon = document.getElementById('product-icon');
        const imageUpload = document.getElementById('image-upload');
        const uploadProgress = document.getElementById('upload-progress');
        const productImageUrl = document.getElementById('product-image-url');
        const saveBtn = document.getElementById('save-product-btn');
        const cancelEditBtn = document.getElementById('cancel-edit');
        const formTitle = document.getElementById('form-title');
        const formMessage = document.getElementById('form-message');
        const productsListDiv = document.getElementById('products-list');
        const ordersListDiv = document.getElementById('orders-list');

        let editingProductId = null;
        let pendingImageFile = null;

        // Login logic
        loginBtn.onclick = () => {
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            if (user === VALID_USERNAME && pass === VALID_PASSWORD) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                loadProducts();
                loadOrders();
                loginError.classList.add('hidden');
            } else {
                loginError.textContent = "Invalid. Use admin / maaz123";
                loginError.classList.remove('hidden');
            }
        };
        logoutBtn.onclick = () => {
            loginScreen.style.display = 'flex';
            dashboard.style.display = 'none';
            resetForm();
        };

        // Tab switching
        tabProducts.onclick = () => {
            tabProducts.classList.add('active');
            tabOrders.classList.remove('active');
            productsPanel.style.display = 'block';
            ordersPanel.style.display = 'none';
        };
        tabOrders.onclick = () => {
            tabOrders.classList.add('active');
            tabProducts.classList.remove('active');
            ordersPanel.style.display = 'block';
            productsPanel.style.display = 'none';
            loadOrders(); // refresh when tab opens
        };

        // Image upload handler
        imageUpload.addEventListener('change', (e) => {
            pendingImageFile = e.target.files[0] || null;
            if (pendingImageFile) uploadProgress.textContent = `Selected: ${pendingImageFile.name}`;
            else uploadProgress.textContent = '';
        });

        async function uploadImage(file) {
            if (!file) return null;
            const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);
            return new Promise((resolve, reject) => {
                uploadTask.on('state_changed',
                    (snapshot) => {
                        const percent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        uploadProgress.textContent = `Uploading ${Math.round(percent)}%`;
                    },
                    reject,
                    async () => {
                        const url = await getDownloadURL(uploadTask.snapshot.ref);
                        uploadProgress.textContent = 'Upload complete!';
                        resolve(url);
                    }
                );
            });
        }

        // Save product (create or update)
        saveBtn.onclick = async () => {
            const name = productName.value.trim();
            const price = productPrice.value.trim();
            const desc = productDesc.value.trim();
            const specs = productSpecs.value.trim();
            const icon = productIcon.value.trim() || 'fa-microchip';
            let image = productImageUrl.value.trim();

            if (!name || !price) {
                formMessage.textContent = 'Name and price are required';
                formMessage.classList.add('text-red-400');
                return;
            }

            formMessage.textContent = 'Saving...';
            formMessage.classList.remove('text-red-400', 'text-green-400');

            try {
                if (pendingImageFile) {
                    image = await uploadImage(pendingImageFile);
                    productImageUrl.value = image;
                    pendingImageFile = null;
                    imageUpload.value = '';
                }
                const productData = { name, price, desc, specs, icon, image: image || '' };
                if (editingProductId) {
                    await updateDoc(doc(db, 'products', editingProductId), productData);
                    formMessage.textContent = 'Product updated!';
                } else {
                    await addDoc(collection(db, 'products'), productData);
                    formMessage.textContent = 'Product added!';
                }
                formMessage.classList.add('text-green-400');
                resetForm();
                loadProducts();
            } catch (err) {
                formMessage.textContent = 'Error: ' + err.message;
                formMessage.classList.add('text-red-400');
            }
        };

        function resetForm() {
            productName.value = '';
            productPrice.value = '';
            productDesc.value = '';
            productSpecs.value = '';
            productIcon.value = 'fa-microchip';
            productImageUrl.value = '';
            imageUpload.value = '';
            pendingImageFile = null;
            uploadProgress.textContent = '';
            editingProductId = null;
            formTitle.textContent = 'Add New Product';
            cancelEditBtn.classList.add('hidden');
        }
        cancelEditBtn.onclick = resetForm;

        // Load products
        async function loadProducts() {
            const snapshot = await getDocs(collection(db, 'products'));
            productsListDiv.innerHTML = '';
            for (const docSnap of snapshot.docs) {
                const prod = docSnap.data();
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div class="flex-1">
                        <strong>${escapeHtml(prod.name)}</strong> - ${escapeHtml(prod.price)}
                        <div class="text-sm text-gray-400">${escapeHtml(prod.desc?.substring(0, 80))}</div>
                        ${prod.image ? `<img src="${escapeHtml(prod.image)}" class="image-preview" alt="preview">` : ''}
                    </div>
                    <div class="flex gap-2">
                        <button class="edit-product-btn edit-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Edit</button>
                        <button class="delete-product-btn delete-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Delete</button>
                    </div>
                `;
                productsListDiv.appendChild(div);
            }
            // attach edit events
            document.querySelectorAll('.edit-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const docRef = doc(db, 'products', id);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const prod = docSnap.data();
                        productName.value = prod.name;
                        productPrice.value = prod.price;
                        productDesc.value = prod.desc || '';
                        productSpecs.value = prod.specs || '';
                        productIcon.value = prod.icon || 'fa-microchip';
                        productImageUrl.value = prod.image || '';
                        editingProductId = id;
                        formTitle.textContent = 'Edit Product';
                        cancelEditBtn.classList.remove('hidden');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };
            });
            document.querySelectorAll('.delete-product-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete this product?')) {
                        await deleteDoc(doc(db, 'products', btn.getAttribute('data-id')));
                        loadProducts();
                    }
                };
            });
        }

        // Load orders
        async function loadOrders() {
            const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);
            ordersListDiv.innerHTML = '';
            if (snapshot.empty) {
                ordersListDiv.innerHTML = '<p class="text-center text-white/50">No orders yet.</p>';
                return;
            }
            for (const docSnap of snapshot.docs) {
                const order = docSnap.data();
                const orderId = docSnap.id;
                const customer = order.customer || {};
                const product = order.product || {};
                const status = order.status || 'pending';
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
                    <div class="flex-1">
                        <div><strong>${escapeHtml(customer.name)}</strong> (${escapeHtml(customer.email)})</div>
                        <div class="text-sm">📞 ${escapeHtml(customer.phone)} | 🏠 ${escapeHtml(customer.address)}</div>
                        <div class="text-sm">🛍️ ${escapeHtml(product.name)} - ${escapeHtml(product.price)} | 💳 ${escapeHtml(customer.paymentMethod)}</div>
                        <div class="text-xs text-gray-400 mt-1">Order ID: ${escapeHtml(order.orderId || orderId)}</div>
                    </div>
                    <div class="flex flex-col gap-2 items-end">
                        <select class="status-select status-dropdown bg-gray-700 px-2 py-1 rounded-lg text-sm" data-id="${orderId}">
                            <option value="pending" ${status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                            <option value="processing" ${status === 'processing' ? 'selected' : ''}>🔧 Processing</option>
                            <option value="shipped" ${status === 'shipped' ? 'selected' : ''}>🚚 Shipped</option>
                            <option value="delivered" ${status === 'delivered' ? 'selected' : ''}>✅ Delivered</option>
                            <option value="cancelled" ${status === 'cancelled' ? 'selected' : ''}>❌ Cancelled</option>
                        </select>
                        <button class="delete-order-btn delete-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${orderId}">Delete Order</button>
                    </div>
                `;
                ordersListDiv.appendChild(div);
            }

            // Attach status change events
            document.querySelectorAll('.status-dropdown').forEach(select => {
                select.onchange = async (e) => {
                    const orderId = select.getAttribute('data-id');
                    const newStatus = select.value;
                    await updateDoc(doc(db, 'orders', orderId), { status: newStatus });
                    loadOrders(); // refresh
                };
            });
            // Attach delete events
            document.querySelectorAll('.delete-order-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete this order? This cannot be undone.')) {
                        await deleteDoc(doc(db, 'orders', btn.getAttribute('data-id')));
                        loadOrders();
                    }
                };
            });
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    </script>
</body>
</html>
