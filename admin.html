<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaz Admin - Firestore + Cloudinary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30,30,30,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 1.5rem; }
        input, textarea { background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; padding: 0.75rem; width: 100%; margin-top: 0.25rem; }
        button { transition: all 0.2s; cursor: pointer; }
        .product-list-item { background: #1a1a1a; border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .delete-btn { background: #dc2626; }
        .edit-btn { background: #3b82f6; }
        .image-preview { max-width: 60px; max-height: 60px; border-radius: 8px; }
        .upload-progress { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Login -->
        <div id="login-screen" class="flex justify-center items-center min-h-screen">
            <div class="card w-full max-w-md">
                <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
                <input type="text" id="login-username" placeholder="Username (admin)" class="mb-3">
                <input type="password" id="login-password" placeholder="Password (maaz123)" class="mb-4">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 w-full py-2 rounded-xl">Login</button>
                <p id="login-error" class="text-red-400 text-sm mt-3 hidden"></p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display: none;">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">Product Manager</h1>
                <button id="logout-btn" class="bg-red-600 px-4 py-2 rounded-xl text-sm">Logout</button>
            </div>

            <div class="card mb-10">
                <h2 class="text-xl font-semibold mb-4" id="form-title">Add New Product</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="product-name" placeholder="Product name *">
                    <input type="text" id="product-price" placeholder="Price (e.g., $489) *">
                    <input type="file" id="image-upload" accept="image/*">
                    <div id="upload-progress" class="upload-progress"></div>
                    <textarea id="product-desc" rows="3" placeholder="Short description"></textarea>
                    <textarea id="product-specs" rows="3" placeholder="Specifications"></textarea>
                    <input type="text" id="product-icon" placeholder="Icon class (e.g., fa-microchip)" value="fa-microchip">
                </div>
                <div class="flex gap-3 mt-6">
                    <button id="save-product-btn" class="bg-green-600 px-6 py-2 rounded-xl">Save Product</button>
                    <button id="cancel-edit" class="bg-gray-600 px-6 py-2 rounded-xl hidden">Cancel</button>
                </div>
                <p id="form-message" class="text-sm mt-3"></p>
            </div>

            <h2 class="text-xl font-semibold mb-4">All Products</h2>
            <div id="products-list" class="space-y-2"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "firebase/firestore";

        // Firebase config (your existing one)
        const firebaseConfig = {
            apiKey: "AIzaSyCyG5fwhCstTKBVjwz5j3D6UHvDHyho8J0",
            authDomain: "dmaaz-da461.firebaseapp.com",
            databaseURL: "https://dmaaz-da461-default-rtdb.firebaseio.com",
            projectId: "dmaaz-da461",
            storageBucket: "dmaaz-da461.firebasestorage.app",
            messagingSenderId: "86883298773",
            appId: "1:86883298773:web:13743b90f7f7023955615c",
            measurementId: "G-7GGQYKJSPE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cloudinary settings (REPLACE WITH YOURS)
        const CLOUD_NAME = "YOUR_CLOUD_NAME";      // e.g., "dzx7q5k8v"
        const UPLOAD_PRESET = "product_images";    // the unsigned preset you created

        // DOM elements
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const saveBtn = document.getElementById('save-product-btn');
        const cancelEditBtn = document.getElementById('cancel-edit');
        const productName = document.getElementById('product-name');
        const productPrice = document.getElementById('product-price');
        const productDesc = document.getElementById('product-desc');
        const productSpecs = document.getElementById('product-specs');
        const productIcon = document.getElementById('product-icon');
        const imageUpload = document.getElementById('image-upload');
        const uploadProgress = document.getElementById('upload-progress');
        const formMessage = document.getElementById('form-message');
        const productsListDiv = document.getElementById('products-list');
        const formTitle = document.getElementById('form-title');

        let editingProductId = null;
        let pendingImageFile = null;

        // Hardcoded login
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "maaz123";

        loginBtn.onclick = () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                loadProducts();
            } else {
                loginError.textContent = "Invalid. Use admin / maaz123";
                loginError.classList.remove('hidden');
            }
        };

        logoutBtn.onclick = () => {
            loginScreen.style.display = 'flex';
            dashboard.style.display = 'none';
            resetForm();
        };

        imageUpload.addEventListener('change', (e) => {
            pendingImageFile = e.target.files[0] || null;
            if (pendingImageFile) uploadProgress.textContent = `Selected: ${pendingImageFile.name}`;
            else uploadProgress.textContent = '';
        });

        // Upload to Cloudinary
        async function uploadToCloudinary(file) {
            if (!file) return null;
            const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            uploadProgress.textContent = "Uploading 0%";
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open("POST", url, true);
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        uploadProgress.textContent = `Uploading ${percent}%`;
                    }
                };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        uploadProgress.textContent = "Upload complete!";
                        resolve(response.secure_url);
                    } else {
                        reject(new Error("Cloudinary upload failed"));
                    }
                };
                xhr.onerror = () => reject(new Error("Network error"));
                xhr.send(formData);
            });
        }

        // Save product (with optional Cloudinary upload)
        saveBtn.onclick = async () => {
            const name = productName.value.trim();
            const price = productPrice.value.trim();
            const desc = productDesc.value.trim();
            const specs = productSpecs.value.trim();
            const icon = productIcon.value.trim() || 'fa-microchip';
            
            if (!name || !price) {
                formMessage.textContent = 'Name and price are required';
                formMessage.classList.add('text-red-400');
                return;
            }

            formMessage.textContent = 'Saving...';
            formMessage.classList.remove('text-red-400', 'text-green-400');

            try {
                let imageUrl = '';
                if (pendingImageFile) {
                    imageUrl = await uploadToCloudinary(pendingImageFile);
                    pendingImageFile = null;
                    imageUpload.value = '';
                }

                const productData = { name, price, desc, specs, icon, image: imageUrl };

                if (editingProductId) {
                    await updateDoc(doc(db, 'products', editingProductId), productData);
                    formMessage.textContent = 'Product updated!';
                } else {
                    await addDoc(collection(db, 'products'), productData);
                    formMessage.textContent = 'Product added!';
                }
                formMessage.classList.add('text-green-400');
                resetForm();
                loadProducts();
            } catch (err) {
                formMessage.textContent = 'Error: ' + err.message;
                formMessage.classList.add('text-red-400');
                console.error(err);
            }
        };

        function resetForm() {
            productName.value = '';
            productPrice.value = '';
            productDesc.value = '';
            productSpecs.value = '';
            productIcon.value = 'fa-microchip';
            imageUpload.value = '';
            pendingImageFile = null;
            uploadProgress.textContent = '';
            editingProductId = null;
            formTitle.textContent = 'Add New Product';
            cancelEditBtn.classList.add('hidden');
        }

        cancelEditBtn.onclick = resetForm;

        async function loadProducts() {
            const querySnapshot = await getDocs(collection(db, 'products'));
            productsListDiv.innerHTML = '';
            for (const docSnap of querySnapshot.docs) {
                const prod = docSnap.data();
                const div = document.createElement('div');
                div.className = 'product-list-item';
                div.innerHTML = `
                    <div class="flex-1">
                        <strong>${escapeHtml(prod.name)}</strong> - ${escapeHtml(prod.price)}
                        <div class="text-sm text-gray-400">${escapeHtml(prod.desc?.substring(0, 60))}</div>
                        ${prod.image ? `<img src="${escapeHtml(prod.image)}" class="image-preview" alt="preview">` : ''}
                    </div>
                    <div class="flex gap-2">
                        <button class="edit-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Edit</button>
                        <button class="delete-btn text-white px-3 py-1 rounded-lg text-sm" data-id="${docSnap.id}">Delete</button>
                    </div>
                `;
                productsListDiv.appendChild(div);
            }

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const docRef = doc(db, 'products', id);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const prod = docSnap.data();
                        productName.value = prod.name;
                        productPrice.value = prod.price;
                        productDesc.value = prod.desc || '';
                        productSpecs.value = prod.specs || '';
                        productIcon.value = prod.icon || 'fa-microchip';
                        editingProductId = id;
                        formTitle.textContent = 'Edit Product';
                        cancelEditBtn.classList.remove('hidden');
                        pendingImageFile = null;
                        imageUpload.value = '';
                        uploadProgress.textContent = '';
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete this product?')) {
                        await deleteDoc(doc(db, 'products', btn.getAttribute('data-id')));
                        loadProducts();
                    }
                };
            });
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    </script>
</body>
</html>
