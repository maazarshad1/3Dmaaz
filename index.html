<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Maaz — Working Product Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; overflow-x: hidden; }
    #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; background: #0a0a0a; }
    .content { position: relative; z-index: 10; color: #fff; }
    .page { display: none; min-height: 100vh; padding: 2rem; }
    .page.active { display: block; }
    .product-card { background: rgba(20,20,20,0.8); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 1.5rem; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
    .product-card:hover { transform: translateY(-8px); background: rgba(30,30,30,0.9); }
    .card-image { width: 100%; height: 200px; object-fit: cover; border-radius: 1rem; margin-bottom: 1rem; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
    .btn-back { background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 40px; display: inline-block; margin-bottom: 2rem; cursor: pointer; }
    .swiper { width: 100%; height: 400px; border-radius: 1rem; margin-bottom: 1rem; }
    .swiper-slide img { width: 100%; height: 100%; object-fit: contain; background: #000; }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 1rem; background: #000; border-radius: 1rem; overflow: hidden; }
    .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .nav-link { color: white; text-decoration: none; margin-right: 1rem; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a1a; padding: 0.5rem 1rem; border-radius: 20px; z-index: 1000; opacity: 0; transition: 0.3s; }
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="toast-message" class="toast"></div>

<div class="content">
  <nav class="fixed top-0 left-0 w-full z-50 p-4 backdrop-blur-md bg-black/50">
    <div class="max-w-7xl mx-auto flex justify-between">
      <div class="text-2xl font-bold">MAAZ</div>
      <div>
        <a href="#home" data-page="home" class="nav-link page-link">Home</a>
        <a href="#products" data-page="products" class="nav-link page-link">Products</a>
        <a href="#wishlist" data-page="wishlist" class="nav-link page-link">Wishlist</a>
        <a href="#orders" data-page="orders" class="nav-link page-link">Orders</a>
      </div>
    </div>
  </nav>

  <!-- Home Page (simplified) -->
  <div id="home-page" class="page">
    <section class="pt-28 px-6"><div class="max-w-7xl mx-auto"><div class="text-center"><h1 class="text-6xl font-bold">MaaZ visions.</h1><p class="text-xl mt-4">Where minimalism meets designed to reshape perception.</p><div class="mt-8"><a href="#products" data-page="products" class="page-link bg-white text-black px-6 py-2 rounded-full">Explore →</a></div></div></div></section>
    <section class="py-16 px-6"><div class="max-w-7xl mx-auto"><h2 class="text-3xl font-bold mb-6">Best Sellers</h2><div id="best-selling-grid" class="product-grid"></div></div></section>
    <section class="py-16 px-6"><div class="max-w-7xl mx-auto"><h2 class="text-3xl font-bold mb-6">Other Collection</h2><div id="other-collection-grid" class="product-grid"></div></div></section>
  </div>

  <!-- Products Grid Page -->
  <div id="products-page" class="page">
    <section class="pt-28 px-6"><div class="max-w-7xl mx-auto"><h2 class="text-3xl font-bold mb-6">All Products</h2><div id="all-products-grid" class="product-grid"></div></div></section>
  </div>

  <!-- Product Detail Page -->
  <div id="product-detail-page" class="page">
    <section class="pt-28 px-6"><div class="max-w-6xl mx-auto">
      <div class="btn-back" id="back-to-products"><i class="fas fa-arrow-left"></i> Back to Products</div>
      <div class="grid md:grid-cols-2 gap-8">
        <div id="detail-media"></div>
        <div>
          <h1 id="detail-title" class="text-4xl font-bold"></h1>
          <p id="detail-price" class="text-2xl text-green-400 mt-2"></p>
          <p id="detail-desc" class="mt-4 text-white/70"></p>
          <div class="mt-6"><h3 class="text-xl font-semibold">Specifications</h3><div id="detail-specs" class="text-white/80 mt-2"></div></div>
          <div class="mt-8"><button id="detail-order-btn" class="w-full bg-green-600 py-3 rounded-full font-bold">Order Now</button><button id="detail-wishlist-btn" class="w-full mt-3 border border-white/30 py-2 rounded-full">❤️ Add to Wishlist</button></div>
        </div>
      </div>
    </div></section>
  </div>

  <!-- Wishlist & Orders pages (minimal) -->
  <div id="wishlist-page" class="page"><div class="pt-28 px-6"><div class="max-w-4xl mx-auto"><h2 class="text-3xl font-bold">My Wishlist</h2><div id="wishlist-items-container"></div><p id="empty-wishlist" class="text-white/50">Empty</p></div></div></div>
  <div id="orders-page" class="page"><div class="pt-28 px-6"><div class="max-w-4xl mx-auto"><h2 class="text-3xl font-bold">My Orders</h2><input type="email" id="order-email" placeholder="Your email" class="w-full p-2 bg-white/10 rounded mb-3"><button id="lookup-orders" class="bg-blue-600 px-4 py-2 rounded">Search</button><div id="orders-list" class="mt-4"></div><p id="no-orders" class="text-white/50 hidden">No orders</p></div></div></div>

  <footer class="text-center text-white/40 py-8">© 2026 Maaz</footer>
</div>

<!-- Checkout Modal -->
<div id="checkout-modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;"><div class="bg-black p-6 rounded-2xl max-w-md w-full"><span class="float-right cursor-pointer text-xl close-checkout">&times;</span><h2 class="text-2xl font-bold mb-4">Complete Order</h2><form id="checkout-form"><input type="text" id="checkout-name" placeholder="Full Name" required class="w-full p-2 mb-2 bg-gray-800 rounded"><input type="email" id="checkout-email" placeholder="Email" required class="w-full p-2 mb-2 bg-gray-800 rounded"><input type="tel" id="checkout-phone" placeholder="Phone" required class="w-full p-2 mb-2 bg-gray-800 rounded"><textarea id="checkout-address" rows="2" placeholder="Address" required class="w-full p-2 mb-2 bg-gray-800 rounded"></textarea><select id="checkout-payment" class="w-full p-2 mb-4 bg-gray-800 rounded"><option>Cash on Delivery</option></select><div id="checkout-product-info" class="text-sm mb-3"></div><button type="submit" class="bg-green-600 w-full py-2 rounded">Place Order</button></form><p id="order-feedback" class="text-sm mt-2 text-center text-green-400 hidden"></p></div></div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
      "swiper": "https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs"
    }
  }
</script>
<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, query, where, orderBy, serverTimestamp } from "firebase/firestore";
  import Swiper from 'swiper';

  const firebaseConfig = {
    apiKey: "AIzaSyCyG5fwhCstTKBVjwz5j3D6UHvDHyho8J0",
    authDomain: "dmaaz-da461.firebaseapp.com",
    projectId: "dmaaz-da461",
    storageBucket: "dmaaz-da461.firebasestorage.app",
    messagingSenderId: "86883298773",
    appId: "1:86883298773:web:13743b90f7f7023955615c"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let userId = localStorage.getItem('wishlist_user_id');
  if (!userId) { userId = 'user_' + Date.now(); localStorage.setItem('wishlist_user_id', userId); }
  let selectedProduct = null;

  function showToast(msg) {
    const toast = document.getElementById('toast-message');
    toast.textContent = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
  }

  // Helper: escape HTML
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  // ---- Product Grid Rendering ----
  async function loadProducts() {
    const snapshot = await getDocs(collection(db, 'products'));
    const products = [];
    snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
    const best = products.slice(0,3);
    const other = products.slice(3);
    const renderCard = (p) => `
      <div class="product-card" data-product='${JSON.stringify(p)}'>
        ${p.image ? `<img src="${escapeHtml(p.image)}" class="card-image">` : `<div class="w-full h-56 bg-gray-800 rounded-2xl flex items-center justify-center text-5xl mb-4"><i class="fas ${p.icon || 'fa-microchip'}"></i></div>`}
        <h3 class="text-xl font-bold">${escapeHtml(p.name)}</h3>
        <p class="text-white/60">${escapeHtml(p.price)}</p>
        <button class="view-detail-btn mt-3 bg-blue-600 px-4 py-1 rounded-full text-sm">View Details</button>
      </div>
    `;
    document.getElementById('best-selling-grid').innerHTML = best.map(p => renderCard(p)).join('');
    document.getElementById('other-collection-grid').innerHTML = other.map(p => renderCard(p)).join('');
    document.getElementById('all-products-grid').innerHTML = products.map(p => renderCard(p)).join('');
    // Attach click events to all "View Details" buttons
    document.querySelectorAll('.view-detail-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const card = btn.closest('.product-card');
        const product = JSON.parse(card.getAttribute('data-product'));
        showProductDetail(product);
      });
    });
  }

  // ---- Show Product Detail Page ----
  function showProductDetail(product) {
    // Update detail page content
    document.getElementById('detail-title').innerText = product.name;
    document.getElementById('detail-price').innerText = product.price;
    document.getElementById('detail-desc').innerText = product.desc || 'No description available.';
    let specsHtml = '';
    if (product.specs) {
      specsHtml = `<ul class="list-disc pl-5">${product.specs.split('\n').map(line => `<li>${escapeHtml(line)}</li>`).join('')}</ul>`;
    } else {
      specsHtml = '<p>No specifications.</p>';
    }
    document.getElementById('detail-specs').innerHTML = specsHtml;

    // Build media (images + video)
    const mediaDiv = document.getElementById('detail-media');
    mediaDiv.innerHTML = '';
    const allImages = [product.image, ...(product.images || [])].filter(Boolean);
    if (allImages.length) {
      const swiperDiv = document.createElement('div');
      swiperDiv.className = 'swiper';
      const wrapper = document.createElement('div');
      wrapper.className = 'swiper-wrapper';
      allImages.forEach(img => {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `<img src="${img}" style="width:100%; height:100%; object-fit:contain; background:#000;">`;
        wrapper.appendChild(slide);
      });
      swiperDiv.appendChild(wrapper);
      const nextBtn = document.createElement('div'); nextBtn.className = 'swiper-button-next';
      const prevBtn = document.createElement('div'); prevBtn.className = 'swiper-button-prev';
      swiperDiv.appendChild(nextBtn); swiperDiv.appendChild(prevBtn);
      mediaDiv.appendChild(swiperDiv);
      new Swiper(swiperDiv, { navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, loop: true });
    }
    if (product.videoUrl) {
      let videoHtml = '';
      const url = product.videoUrl;
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        let vidId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        videoHtml = `<div class="video-container mt-4"><iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe></div>`;
      } else if (url.includes('vimeo.com')) {
        let vidId = url.split('/').pop();
        videoHtml = `<div class="video-container mt-4"><iframe src="https://player.vimeo.com/video/${vidId}" allowfullscreen></iframe></div>`;
      } else {
        videoHtml = `<div class="video-container mt-4"><video controls src="${url}"></video></div>`;
      }
      mediaDiv.innerHTML += videoHtml;
    }

    // Set order and wishlist buttons
    document.getElementById('detail-order-btn').onclick = () => openCheckout(product);
    document.getElementById('detail-wishlist-btn').onclick = () => addToWishlist(product);

    // Switch to detail page
    showPage('product-detail');
    window.scrollTo({ top: 0 });
  }

  // ---- Wishlist Functions ----
  async function addToWishlist(product) {
    const q = query(collection(db, 'wishlists'), where('userId', '==', userId), where('productId', '==', product.id || product.name));
    const existing = await getDocs(q);
    if (!existing.empty) { showToast("Already in wishlist"); return; }
    await addDoc(collection(db, 'wishlists'), { userId, productId: product.id || product.name, product, addedAt: serverTimestamp() });
    showToast(`❤️ Added "${product.name}" to wishlist`);
    loadWishlistPage();
  }
  async function loadWishlistPage() {
    const q = query(collection(db, 'wishlists'), where('userId', '==', userId));
    const snapshot = await getDocs(q);
    const items = [];
    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
    const container = document.getElementById('wishlist-items-container');
    const emptyMsg = document.getElementById('empty-wishlist');
    if (!items.length) { container.innerHTML = ''; emptyMsg.classList.remove('hidden'); return; }
    emptyMsg.classList.add('hidden');
    container.innerHTML = items.map(item => `<div class="bg-white/10 p-3 rounded mb-2 flex justify-between"><div><strong>${escapeHtml(item.product.name)}</strong><br>${escapeHtml(item.product.price)}</div><div><button class="order-from-wishlist bg-blue-600 px-3 py-1 rounded" data-prod='${JSON.stringify(item.product)}'>Order</button><button class="remove-wishlist bg-red-600 px-3 py-1 rounded ml-2" data-id="${item.id}">Remove</button></div></div>`).join('');
    document.querySelectorAll('.order-from-wishlist').forEach(btn => btn.onclick = () => openCheckout(JSON.parse(btn.getAttribute('data-prod'))));
    document.querySelectorAll('.remove-wishlist').forEach(async btn => { btn.onclick = async () => { await deleteDoc(doc(db, 'wishlists', btn.getAttribute('data-id'))); loadWishlistPage(); }; });
  }

  // ---- Checkout & Orders ----
  async function openCheckout(product) {
    selectedProduct = product;
    document.getElementById('checkout-product-info').innerHTML = `<strong>${product.name}</strong> - ${product.price}`;
    document.getElementById('checkout-modal').style.display = 'flex';
  }
  document.getElementById('checkout-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('checkout-name').value;
    const email = document.getElementById('checkout-email').value;
    const phone = document.getElementById('checkout-phone').value;
    const address = document.getElementById('checkout-address').value;
    const payment = document.getElementById('checkout-payment').value;
    if (!name || !email || !phone || !address) { showToast("Fill all fields"); return; }
    try {
      await addDoc(collection(db, 'orders'), {
        product: selectedProduct,
        customer: { name, email, phone, address, paymentMethod: payment },
        status: 'pending',
        createdAt: serverTimestamp(),
        orderId: Date.now().toString()
      });
      document.getElementById('order-feedback').textContent = "Order placed!";
      document.getElementById('order-feedback').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('checkout-modal').style.display = 'none';
        document.getElementById('order-feedback').classList.add('hidden');
        document.getElementById('checkout-form').reset();
        showToast("Order confirmed!");
      }, 1500);
    } catch(err) { showToast("Error: "+err.message); }
  });
  document.getElementById('lookup-orders').onclick = async () => {
    const email = document.getElementById('order-email').value;
    if (!email) return;
    const q = query(collection(db, 'orders'), where('customer.email', '==', email));
    const snap = await getDocs(q);
    const orders = [];
    snap.forEach(d => orders.push(d.data()));
    const container = document.getElementById('orders-list');
    const no = document.getElementById('no-orders');
    if (!orders.length) { container.innerHTML = ''; no.classList.remove('hidden'); return; }
    no.classList.add('hidden');
    container.innerHTML = orders.map(o => `<div class="bg-white/10 p-3 rounded mb-2"><strong>${o.product.name}</strong> - ${o.product.price}<br>Status: ${o.status}</div>`).join('');
  };

  // ---- Page Routing ----
  const pages = {
    home: document.getElementById('home-page'),
    products: document.getElementById('products-page'),
    productDetail: document.getElementById('product-detail-page'),
    wishlist: document.getElementById('wishlist-page'),
    orders: document.getElementById('orders-page')
  };
  function showPage(pageId) {
    Object.values(pages).forEach(p => p.classList.remove('active'));
    if (pages[pageId]) pages[pageId].classList.add('active');
    history.pushState(null, '', `#${pageId}`);
    if (pageId === 'wishlist') loadWishlistPage();
  }
  document.querySelectorAll('.page-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const p = link.getAttribute('data-page');
      if (p && pages[p]) showPage(p);
    });
  });
  document.getElementById('back-to-products').addEventListener('click', () => showPage('products'));

  window.addEventListener('load', () => {
    const hash = location.hash.slice(1);
    if (pages[hash]) showPage(hash);
    else showPage('home');
    loadProducts();
  });
  window.addEventListener('popstate', () => {
    const hash = location.hash.slice(1);
    if (pages[hash]) showPage(hash);
    else showPage('home');
  });

  // Modal close
  const modal = document.getElementById('checkout-modal');
  document.querySelector('.close-checkout').addEventListener('click', () => modal.style.display = 'none');
  window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
</script>
</body>
</html>
